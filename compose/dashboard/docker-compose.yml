services:
  dashboard:
    build:
      context: /srv/infra/apps/dashboard
      dockerfile: Dockerfile
    container_name: dashboard-web
    restart: unless-stopped
    networks:
      frontdoor:
        aliases:
          - dashboard
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  frontdoor:
    external: true
    name: frontdoor-net
